<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Reset Password | REDZED REAL</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d0d0f;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    .box {
      width: 100%;
      max-width: 380px;
      padding: 28px;
      background: #17171b;
      border: 1px solid #34343c;
      border-radius: 24px;
    }

    .logo {
      width: 70px;
      height: 70px;
      margin-bottom: 22px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: #ed1f35;
      font-size: 40px;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #aaaab2;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }

    input {
      width: 100%;
      margin-bottom: 16px;
      padding: 15px;
      color: #ffffff;
      background: #0d0d0f;
      border: 1px solid #45454f;
      border-radius: 12px;
      font-size: 17px;
      outline: none;
    }

    input:focus {
      border-color: #ed1f35;
    }

    button {
      width: 100%;
      padding: 15px;
      color: #ffffff;
      background: #ed1f35;
      border: 0;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #msg {
      min-height: 24px;
      margin: 18px 0 0;
      line-height: 1.5;
    }

    .success {
      color: #5ee08a;
    }

    .error {
      color: #ff7c88;
    }

    .back-link {
      display: block;
      margin-top: 22px;
      color: #ff6575;
      text-align: center;
    }
  </style>
</head>

<body>

  <main class="box">

    <div class="logo">R</div>

    <h1>New Password</h1>

    <p class="subtitle">
      Enter and confirm your new REDZED REAL password.
    </p>

    <form id="resetForm">

      <label for="password">
        New password
      </label>

      <input
        id="password"
        type="password"
        minlength="8"
        required
        autocomplete="new-password"
        placeholder="Minimum 8 characters"
      >

      <label for="confirmPassword">
        Confirm password
      </label>

      <input
        id="confirmPassword"
        type="password"
        minlength="8"
        required
        autocomplete="new-password"
        placeholder="Type password again"
      >

      <button
        id="saveButton"
        type="submit"
        disabled
      >
        Checking recovery link...
      </button>

    </form>

    <p id="msg">
      Please wait...
    </p>

    <a
      class="back-link"
      href="real-login.html"
    >
      Back to Owner Login
    </a>

  </main>


  <script>
    const form =
      document.getElementById("resetForm");

    const saveButton =
      document.getElementById("saveButton");

    const msg =
      document.getElementById("msg");


    function showMessage(text, type = "") {
      msg.textContent = text;
      msg.className = type;
    }


    async function prepareRecoverySession() {
      try {
        const url =
          new URL(window.location.href);

        const code =
          url.searchParams.get("code");

        if (code) {
          const { error } =
            await supabaseClient.auth
              .exchangeCodeForSession(code);

          if (error) {
            throw error;
          }

          window.history.replaceState(
            {},
            document.title,
            window.location.pathname
          );
        }

        const {
          data,
          error
        } =
          await supabaseClient.auth.getSession();

        if (error) {
          throw error;
        }

        if (!data.session) {
          saveButton.disabled = true;
          saveButton.textContent =
            "Recovery link required";

          showMessage(
            "This recovery link is invalid, expired, or was not opened from the latest reset email.",
            "error"
          );

          return;
        }

        saveButton.disabled = false;
        saveButton.textContent =
          "Save New Password";

        showMessage(
          "Recovery link verified. अब नया password डालें।",
          "success"
        );

      } catch (error) {
        console.error(error);

        saveButton.disabled = true;
        saveButton.textContent =
          "Recovery link failed";

        showMessage(
          error.message ||
          "Could not verify the recovery link.",
          "error"
        );
      }
    }


    supabaseClient.auth.onAuthStateChange(
      (event, session) => {
        if (
          event === "PASSWORD_RECOVERY" ||
          event === "SIGNED_IN"
        ) {
          if (session) {
            saveButton.disabled = false;
            saveButton.textContent =
              "Save New Password";

            showMessage(
              "Recovery link verified. अब नया password डालें।",
              "success"
            );
          }
        }
      }
    );


    form.addEventListener(
      "submit",
      async (event) => {
        event.preventDefault();

        const password =
          document
            .getElementById("password")
            .value;

        const confirmPassword =
          document
            .getElementById(
              "confirmPassword"
            )
            .value;

        if (password.length < 8) {
          showMessage(
            "Password कम से कम 8 characters का रखें।",
            "error"
          );
          return;
        }

        if (password !== confirmPassword) {
          showMessage(
            "दोनों passwords match नहीं कर रहे।",
            "error"
          );
          return;
        }

        saveButton.disabled = true;
        saveButton.textContent =
          "Saving...";

        const { error } =
          await supabaseClient.auth.updateUser({
            password
          });

        if (error) {
          saveButton.disabled = false;
          saveButton.textContent =
            "Save New Password";

          showMessage(
            error.message,
            "error"
          );

          return;
        }

        showMessage(
          "Password updated successfully. Login page खुल रहा है...",
          "success"
        );

        await supabaseClient.auth.signOut();

        setTimeout(() => {
          window.location.replace(
            "real-login.html"
          );
        }, 1800);
      }
    );


    prepareRecoverySession();
  </script>

</body>
</html>
