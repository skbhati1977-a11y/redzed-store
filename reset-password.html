<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
background:#111;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
width:320px;
padding:20px;
background:#1b1b1b;
border-radius:12px;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}
button{
width:100%;
padding:12px;
background:#e11d2e;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
}
</style>

</head>

<body>

<div class="box">
<h2>New Password</h2>

<input type="password" id="pass" placeholder="New Password">

<button onclick="savePassword()">Save Password</button>

<p id="msg"></p>

</div>

<script>

async function savePassword(){

const password=document.getElementById("pass").value;

const {error}=await supabaseClient.auth.updateUser({
password:password
});

if(error){
document.getElementById("msg").innerText=error.message;
}else{
document.getElementById("msg").innerText="Password Updated Successfully";
setTimeout(()=>{
location.href="real-login.html";
},1500);
}

}

</script>

</body>
</html>
