<!doctype html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>REDZED Admin</title><link rel="stylesheet" href="style.css"></head><body><header class="nav"><div class="logo">REDZED<span>ADMIN</span></div><nav><a href="index.html">Store</a></nav></header><main class="panel"><section class="login" id="loginBox"><h2>Admin Login</h2><p>पहली बार: config.js में ADMIN_PIN set करें.</p><input id="pin" type="password" placeholder="Admin PIN"><button id="loginBtn" class="btn">Login</button></section><section id="adminBox" class="hidden"><div class="panel-head"><h2>Product Manager</h2><button id="logoutBtn" class="btn ghost">Logout</button></div><form id="productForm" class="form"><input name="item_name" placeholder="Item name" required><input name="art_no" placeholder="Art no / Lot no"><select name="category_id" id="categorySelect" required></select><input name="size" placeholder="Size e.g. L.XL.XXL"><input name="pcs" type="number" placeholder="Pcs"><input name="rate" type="number" placeholder="Rate"><input name="fabric" placeholder="Fabric"><input name="colors" placeholder="Colors e.g. Navy, Olive, Onion"><textarea name="description" placeholder="Description"></textarea><label class="check"><input name="featured" type="checkbox"> Featured</label><label class="check"><input name="in_stock" type="checkbox" checked> In Stock</label><label class="upload">Product Photo<input name="photo" type="file" accept="image/*"></label><button class="btn" type="submit">Save Product</button><p id="msg"></p></form><h3>Current Products</h3><div id="productList" class="list"></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="admin.js"></script></body></html>
