<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>REDZED REAL Art Master</title>

  <link rel="stylesheet" href="real-style.css?v=1">
</head>

<body class="rr-body">

  <header class="rr-topbar">

    <div>
      <p class="rr-kicker">REDZED REAL</p>
      <h1>Art Master</h1>
    </div>

    <a
      class="rr-btn rr-btn-secondary"
      href="real-dashboard.html"
    >
      Dashboard
    </a>

  </header>


  <main class="rr-page rr-two-column">

    <section class="rr-panel">

      <h2>Create Art</h2>

      <form
        id="artForm"
        class="rr-form rr-form-grid"
      >

        <label>
          Art No

          <input
            id="artNo"
            type="text"
            required
          >
        </label>


        <label>
          Item Name

          <input
            id="itemName"
            type="text"
            required
          >
        </label>


        <label>
          Product Name

          <input
            id="productName"
            type="text"
          >
        </label>


        <label>
          Category

          <input
            id="category"
            type="text"
          >
        </label>


        <label>
          Fabric

          <select id="fabricId">
            <option value="">
              Select fabric
            </option>
          </select>
        </label>


        <label>
          Sizes

          <input
            id="sizes"
            type="text"
            placeholder="L, XL, XXL"
          >
        </label>


        <label>
          Default Box Qty

          <select id="boxQty">

            <option value="6">6</option>
            <option value="10">10</option>
            <option value="12">12</option>
            <option value="18" selected>18</option>
            <option value="24">24</option>
            <option value="30">30</option>
            <option value="36">36</option>

          </select>
        </label>


        <label>
          Dealer Rate

          <input
            id="dealerRate"
            type="number"
            min="0"
            step="0.01"
          >
        </label>


        <label>
          MRP

          <input
            id="mrp"
            type="number"
            min="0"
            step="0.01"
          >
        </label>


        <label class="rr-span-2">
          Description

          <textarea
            id="description"
            rows="3"
          ></textarea>
        </label>


        <button
          class="rr-btn rr-btn-primary rr-span-2"
          type="submit"
        >
          Save Art
        </button>

      </form>


      <p
        id="artMessage"
        class="rr-message"
        role="status"
      ></p>

    </section>


    <section class="rr-panel">

      <div class="rr-panel-head">

        <h2>Saved Arts</h2>

        <button
          id="reloadArts"
          class="rr-btn rr-btn-secondary"
          type="button"
        >
          Refresh
        </button>

      </div>


      <div
        id="artList"
        class="rr-list"
      >

        <p class="rr-muted">
          Loading...
        </p>

      </div>

    </section>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="config.js?v=1"></script>

  <script src="real-art-master.js?v=1"></script>

</body>
</html>
